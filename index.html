<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <title>Rankhify</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root {
            --bg: #0a0a0a; --card: #141414; --text: #ffffff;
            --accent: #5865f2; --border: #252525;
            --gold: #ffd700; --silver: #c0c0c0; --bronze: #cd7f32;
            --danger: #ff4747; --success: #43b581;
        }
        * { user-select: none; -webkit-user-select: none; cursor: default; box-sizing: border-box; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        nav { width: 100%; padding: 20px; background: #000; border-bottom: 2px solid var(--border); text-align: center; font-size: 24px; font-weight: 900; letter-spacing: 3px; color: var(--accent); }
        .search-container { padding: 20px; display: flex; justify-content: center; background: #0d0d0d; }
        #searchBox { width: 100%; max-width: 500px; padding: 12px 20px; background: #1a1a1a; border: 1px solid var(--border); color: white; border-radius: 25px; outline: none; cursor: text; }
        /* Loput tyylit pysyvät samoina kuin aiemmin */
        .rankings-wrapper { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 950px; }
        .player-row { background: var(--card); border: 1px solid var(--border); padding: 15px 25px; margin-bottom: 8px; display: grid; grid-template-columns: 60px 1.5fr 3fr 80px; align-items: center; border-radius: 8px; }
        .rank-id { font-weight: bold; font-size: 20px; text-align: center; }
        .rank-1 { color: var(--gold); } .rank-2 { color: var(--silver); } .rank-3 { color: var(--bronze); }
        .multi-ranks { display: flex; flex-wrap: wrap; gap: 5px; }
        .tier-tag { display: flex; align-items: center; gap: 5px; font-size: 11px; font-weight: bold; padding: 4px 8px; border-radius: 4px; background: #222; border: 1px solid #333; }
        .edit-btn { background: none; border: none; color: #555; cursor: pointer; font-size: 18px; transition: 0.2s; }
        .edit-btn:hover { color: var(--accent); transform: scale(1.2); }
        #admin-modal { display: none; position: fixed; z-index: 999; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.95); align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal-content { background: #161616; padding: 30px; border-radius: 12px; border: 1px solid var(--border); width: 380px; max-height: 90vh; overflow-y: auto; }
        input, select, button { width: 100%; padding: 10px; margin: 5px 0; background: #222; border: 1px solid var(--border); color: white; border-radius: 6px; }
        button { background: var(--accent); border: none; font-weight: bold; cursor: pointer; }
        .btn-leave { background: #333; }
        .btn-danger { background: var(--danger); font-size: 12px; }
        .btn-success { background: var(--success); font-size: 12px; }
        .rank-edit-item { display: flex; justify-content: space-between; align-items: center; background: #222; padding: 8px; margin-bottom: 5px; border-radius: 4px; border: 1px solid #333; }
        .remove-rank-btn { color: var(--danger); cursor: pointer; font-weight: bold; background: none; border: none; width: auto; padding: 0 5px; margin: 0; }
        .hidden { display: none; }
    </style>
</head>
