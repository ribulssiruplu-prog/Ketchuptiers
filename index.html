<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rankhify | THE ONE</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700;800&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030303;
            --accent: #7000ff;
            --accent-glow: rgba(112, 0, 255, 0.6);
            --gold: #ffcc00;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Futuristinen animoitu tausta */
        body::before {
            content: "";
            position: absolute;
            width: 150%;
            height: 150%;
            background: radial-gradient(circle at center, var(--accent-glow) 0%, transparent 40%);
            animation: drift 10s infinite alternate ease-in-out;
            z-index: -1;
        }

        @keyframes drift {
            from { transform: translate(-10%, -10%); }
            to { transform: translate(10%, 10%); }
        }

        .profile-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            padding: 40px;
            text-align: center;
            background: var(--glass);
            backdrop-filter: blur(30px);
            border: 1px solid var(--border);
            border-radius: 40px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            animation: popIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .crown {
            font-size: 50px;
            margin-bottom: 10px;
            display: block;
            filter: drop-shadow(0 0 15px var(--gold));
            animation: float 3s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        h1 {
            font-family: 'Rajdhani', sans-serif;
            font-size: 56px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 5px;
            background: linear-gradient(to bottom, #fff 40%, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 20px rgba(255,255,255,0.2));
        }

        .status-badge {
            display: inline-block;
            padding: 5px 15px;
            background: var(--accent);
            border-radius: 20px;
            font-size: 12px;
            font-weight: 900;
            letter-spacing: 2px;
            margin-bottom: 30px;
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .stat-card {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 20px;
            transition: 0.3s;
        }

        .stat-card:hover {
            border-color: var(--accent);
            transform: translateY(-5px);
            background: rgba(112, 0, 255, 0.05);
        }

        .stat-label {
            display: block;
            font-size: 10px;
            color: #777;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .stat-value {
            font-family: 'Rajdhani', sans-serif;
            font-size: 24px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .ht-text { color: var(--gold); text-shadow: 0 0 10px rgba(255,204,0,0.3); }
        .lt-text { color: #aaa; }

        .mace-full { grid-column: span 2; }

    </style>
</head>
<body>

    <div class="profile-container">
        <span class="crown">👑</span>
        <h1>MrKetsuppi</h1>
        <div class="status-badge">TOP TIER PLAYER</div>

        <div class="stats-grid">
            <div class="stat-card">
                <span class="stat-label">Sword Mastery</span>
                <div class="stat-value ht-text">⚔️ HT5</div>
            </div>
            
            <div class="stat-card">
                <span class="stat-label">Crystal PvP</span>
                <div class="stat-value ht-text">🔮 HT4</div>
            </div>

            <div class="stat-card">
                <span class="stat-label">Axe Combat</span>
                <div class="stat-value ht-text">🪓 HT5</div>
            </div>

            <div class="stat-card">
                <span class="stat-label">UHC Survival</span>
                <div class="stat-value lt-text">🍎 LT5</div>
            </div>

            <div class="stat-card mace-full">
                <span class="stat-label">Mace Specialist</span>
                <div class="stat-value lt-text">🔨 LT5</div>
            </div>
        </div>
    </div>

</body>
</html>
